<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AtlheMap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      overflow: hidden;
    }

    .sidebar {
      height: 100vh;
      background-color: #8e44ad;
      color: white;
      padding: 20px;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-3 sidebar">
      <h4>AtlheMap</h4>
      <hr>

      <h6>Locais</h6>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Futebol</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Vôlei</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Academias</label>
      </div>

      <hr>

      <button class="btn btn-light w-100">Atualizar</button>
    </div>

    <div class="col-9">
      <div id="mapa" style="height: 100vh;"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('mapa').setView([-23.9517867, -46.3716661], 19);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  L.marker([-23.9517867, -46.3716661]).addTo(map)
    .bindPopup("AtlheMap 📍")
    .openPopup();
</script>

</body>
</html>
