<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AtlheMap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body {
      overflow: hidden;
      transition: 0.3s;
    }

    .sidebar {
      height: 100vh;
      background-color: #8e44ad;
      color: white;
      padding: 20px;
    }

    .top-bar {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 1000;
    }

    .right-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-icon {
      font-size: 30px;
      cursor: pointer;
      background: white;
      padding: 5px 10px;
      border-radius: 8px;
    }

    .busca-box {
      position: relative;
    }

    .busca-box input {
      padding: 8px 35px 8px 10px;
      border-radius: 8px;
      border: none;
      width: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .busca-box input:focus {
      width: 260px;
    }

    .lupa {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: gray;
    }

    .dark {
      background-color: #121212 !important;
      color: white !important;
    }

    .dark .sidebar {
      background-color: #1f1f1f;
    }

    .dark .menu-icon {
      background: #333;
      color: white;
    }

    .dark .busca-box input {
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <div class="right-box">

    <div class="busca-box">
      <i class="bi bi-search lupa"></i>
      <input type="text" id="busca" placeholder="Buscar local...">
    </div>

    <i class="bi bi-list menu-icon" data-bs-toggle="offcanvas" data-bs-target="#menuLateral"></i>

  </div>
</div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="menuLateral">

  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Menu</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body text-center">

    <img src="img/logo.png" style="width:80px; border-radius:50%;">

    <h5 id="nomeUsuario" class="mt-3">Usuário</h5>
    <p id="emailUsuario" class="text-muted">email@gmail.com</p>

    <hr>

    <button class="btn btn-dark w-100 mb-2" onclick="toggleDark()">🌙 Modo Escuro</button>

    <button class="btn btn-secondary w-100 mb-2">⚙️ Configurações</button>

    <button class="btn btn-info w-100 mb-2">❓ Suporte</button>

    <hr>

    <button class="btn btn-danger w-100" onclick="logout()">Sair</button>

  </div>
</div>

<div class="container-fluid">
  <div class="row">

    <div class="col-3 sidebar">
      <h4>AtlheMap</h4>
      <hr>

      <h6>Locais</h6>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Futebol</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Vôlei</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">Academias</label>
      </div>

      <hr>

      <button class="btn btn-light w-100">Atualizar</button>
    </div>

    <div class="col-9">
      <div id="mapa" style="height: 100vh;"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let usuario = JSON.parse(localStorage.getItem("usuario")) || {
  nome: "Usuário",
  email: "usuario@gmail.com"
};

document.getElementById("nomeUsuario").innerText = usuario.nome;
document.getElementById("emailUsuario").innerText = usuario.email;

function logout() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

var locais = [
  { nome: "Campo de Futebol", lat: -23.9505, lng: -46.3720 },
  { nome: "Quadra de Vôlei", lat: -23.9522, lng: -46.3735 },
  { nome: "Academia Fitness", lat: -23.9510, lng: -46.3708 }
];

document.getElementById("busca").addEventListener("keyup", function() {
  let termo = this.value.toLowerCase();

  let encontrado = locais.find(local =>
    local.nome.toLowerCase().includes(termo)
  );

  if (encontrado) {
    map.setView([encontrado.lat, encontrado.lng], 18);

    L.popup()
      .setLatLng([encontrado.lat, encontrado.lng])
      .setContent(`<b>${encontrado.nome}</b>`)
      .openOn(map);
  }
});

var map = L.map('mapa').setView([-23.9517867, -46.3716661], 19);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

L.marker([-23.9517867, -46.3716661]).addTo(map)
  .bindPopup("AtlheMap 📍")
  .openPopup();
</script>

</body>
</html>
