<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AtlheMap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body {
      overflow: hidden;
      background: #f5f5f5;
    }

    .img-fit {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .eye-icon {
      position: absolute;
      right: 15px;
      top: 38px;
      cursor: pointer;
      font-size: 20px;
      color: gray;
    }

    .eye-icon:hover {
      color: #0d6efd;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-4 p-3">
      <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b" class="img-fit">
      <img src="https://s2-ge.glbimg.com/6kwKMJ8xH9xp01Bpm6Qrq4IN2GA=/0x0:4410x2940/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2021/D/X/V1NbKhTSqrmMlDUBboew/gettyimages-1332793282.jpg" class="img-fit">
    </div>

    <div class="col-4 d-flex align-items-center" style="height: 100vh;">
      <div class="login-box w-100 text-center">


        <img src="z.png" class="logo">

        <h3 class="mb-4">AtlheMap</h3>

        <div class="mb-3 text-start">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="exemplo@gmail.com">
        </div>

        <div class="mb-3 position-relative text-start">
          <label class="form-label">Senha</label>

          <input type="password" id="senha" class="form-control pe-5">

          <i class="bi bi-eye-slash eye-icon" onclick="toggleSenha()" id="icone"></i>

          <div class="form-text">
            Mínimo 8 caracteres, com letras e números.
          </div>
        </div>

        <button class="btn btn-primary w-100 mt-3" onclick="entrar()">Entrar</button>

        <p class="text-center mt-3">
            Não tem conta? <a href="cadastrar.html">Cadastre-se</a>
          </p>

      </div>
    </div>

    <div class="col-4 p-3">
      <img src="https://www.alphavillecampinasclube.com.br/wp-content/uploads/2023/09/academia-alphaville-campinas-clube.jpeg" class="img-fit">
      <img src="https://tecnofit-site.s3.sa-east-1.amazonaws.com/media/files/2023/11/17141202/academia-low-cost-2048x1365.jpg" class="img-fit">
    </div>

  </div>
</div>

<script>
  function mostrarMensagem(texto, tipo) {
  let div = document.getElementById("mensagem");

  div.innerHTML = `
    <div class="alert alert-${tipo} mt-2" role="alert">
      ${texto}
    </div>
  `;

  setTimeout(() => {
    div.innerHTML = "";
  }, 3000);
}

function toggleSenha() {
  let input = document.getElementById("senha");
  let icone = document.getElementById("icone");

  if (input.type === "password") {
    input.type = "text";
    icone.classList.remove("bi-eye-slash");
    icone.classList.add("bi-eye");
  } else {
    input.type = "password";
    icone.classList.remove("bi-eye");
    icone.classList.add("bi-eye-slash");
  }
}

function entrar() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  if (!email.endsWith("@gmail.com")) {
    alert("Use um email @gmail.com");
    return;
  }

  let temNumero = /\d/.test(senha);
  let temLetra = /[a-zA-Z]/.test(senha);

  if (senha.length < 8 || !temNumero || !temLetra) {
    mostrarMensagem("Senha inválida!", "danger");
    return;
  }

  window.location.href = "home.html";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
