<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro - AtlheMap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #2f0257;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #bcbcbc;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div class="card">

  <h3 class="text-center mb-4">Cadastro</h3>

  <div class="mb-3">
    <label>Nome</label>
    <input type="text" id="nome" class="form-control">
  </div>

  <div class="mb-3">
    <label>Email</label>
    <input type="email" id="email" class="form-control" placeholder="nome@gmail.com">
  </div>

  <div class="mb-3">
    <label>Senha</label>
    <input type="password" id="senha" class="form-control">
  </div>

  <div class="mb-3">
    <label>Confirmar Senha</label>
    <input type="password" id="confirmar" class="form-control">
  </div>

  <button class="btn btn-primary w-100 mt-2" onclick="cadastrar()">Cadastrar</button>

  <a href="index.html" class="btn btn-link w-100 mt-2 text-white">Já tenho conta</a>

</div>

<script>
function cadastrar() {
  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;
  let confirmar = document.getElementById("confirmar").value;

  if (nome === "") {
    alert("Digite seu nome");
    return;
  }

  if (!email.endsWith("@gmail.com")) {
    alert("Use um email @gmail.com");
    return;
  }

  let temNumero = /\d/.test(senha);
  let temLetra = /[a-zA-Z]/.test(senha);

  if (senha.length < 8 || !temNumero || !temLetra) {
    alert("Senha fraca!");
    return;
  }

  if (senha !== confirmar) {
    alert("As senhas não coincidem");
    return;
  }

  alert("Cadastro realizado com sucesso!");

  window.location.href = "home.html";
}
</script>

</body>
</html>
